<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CPU Metic Benchmark Database</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#c0c0c8;
  font-family:Tahoma,Verdana,Arial,sans-serif;
  font-size:12px;
  color:#000;
  padding:10px;
}
.container{
  max-width:960px;
  margin:0 auto;
}
.header{
  background:#000080;
  color:#fff;
  padding:8px 12px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  border:1px solid #9999cc;
  margin-bottom:6px;
}
.toolbar{
  background:#d4d0c8;
  border:1px solid #999;
  padding:5px 8px;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.toolbar-btn{
  background:#d4d0c8;
  border-top:1px solid #fff;
  border-left:1px solid #fff;
  border-right:1px solid #404040;
  border-bottom:1px solid #404040;
  padding:2px 10px;
  font-size:11px;
  font-family:Tahoma,Arial,sans-serif;
  cursor:pointer;
}
.toolbar-btn:active{
  border-top:1px solid #404040;
  border-left:1px solid #404040;
  border-right:1px solid #fff;
  border-bottom:1px solid #fff;
}
.toolbar-btn.active{
  background:#000080;
  color:#fff;
  border-top:1px solid #404040;
  border-left:1px solid #404040;
  border-right:1px solid #fff;
  border-bottom:1px solid #fff;
}
.toolbar-sep{width:1px;height:18px;background:#808080;border-right:1px solid #fff;}
.toolbar-info{font-size:11px;color:#333;margin-left:auto;}

.panel{
  border:1px solid #999;
  margin-bottom:8px;
}
.panel-title{
  background:#000080;
  color:#fff;
  padding:4px 10px;
  font-weight:bold;
  font-size:12px;
}
.panel-body{
  background:#d4d0c8;
  padding:0;
}

.tier-bar{
  background:#d4d0c8;
  border-bottom:1px solid #999;
  padding:4px 8px;
  font-size:10px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}
.tier-bar b{color:#000080;}

table{width:100%;border-collapse:collapse;}
thead th{
  background:#e8e4dc;
  border:1px solid #999;
  padding:6px 8px;
  font-size:11px;
  font-weight:bold;
  text-align:center;
}
thead th.left{text-align:left;}
tbody tr{background:#f4f0e8;}
tbody tr:nth-child(even){background:#eae6de;}
tbody tr:hover{background:#ffffc8;}
td{
  border:1px solid #bbb;
  padding:6px 8px;
  font-size:11px;
  vertical-align:middle;
}
.td-rank{text-align:center;font-weight:bold;}
.td-user{text-align:center;}
.td-user a{color:#000080;font-weight:bold;text-decoration:none;}
.td-user a:hover{text-decoration:underline;color:#cc0000;}
.td-cpu{text-align:center;font-size:11px;}
.cpu-cores{font-size:10px;color:#555;}
.td-score{text-align:center;font-weight:bold;}
.score-num{color:#cc0000;font-size:13px;font-family:Courier New,monospace;}
.tier-badge{
  display:inline-block;
  font-size:9px;
  font-weight:bold;
  padding:1px 5px;
  margin-top:1px;
}
.t-Elite    {background:#8B6914;color:#fff;}
.t-High-End {background:#cc5500;color:#fff;}
.t-Upper-Mid{background:#006600;color:#fff;}
.t-Average  {background:#000080;color:#fff;}
.t-Entry    {background:#555;color:#fff;}
.t-Low      {background:#999;color:#fff;}
.td-date{text-align:center;font-size:10px;color:#333;font-family:Courier New,monospace;}

.loading-msg{padding:20px;text-align:center;color:#000080;font-size:13px;}
.err-msg{padding:16px;text-align:center;color:#cc0000;}

.footer{
  text-align:center;
  font-size:11px;
  color:#444;
  margin-top:8px;
  padding:4px;
}

@media(max-width:600px){
  th:nth-child(5),td:nth-child(5){display:none;}
  .cpu-cores{display:none;}
}
</style>
</head>
<body>
<div class="container">

  <div class="header">CPU METIC BENCHMARK DATABASE</div>

  <div class="toolbar">
    <button class="toolbar-btn" onclick="loadData()">&#8635; Refresh</button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn active" id="btnScore" onclick="sortBy('score')">Sort by Score</button>
    <button class="toolbar-btn" id="btnDate" onclick="sortBy('date')">Sort by Date</button>
    <span class="toolbar-info" id="toolbarInfo">Loading...</span>
  </div>

  <div class="panel">
    <div class="panel-title">GLOBAL RANKING</div>
    <div class="panel-body">
      <div class="tier-bar">
        <b>Tier:</b>
        <span>&#9632; <span style="color:#8B6914;font-weight:bold;">Elite</span> 9000+</span>
        <span>&#9632; <span style="color:#cc5500;font-weight:bold;">High-End</span> 7000+</span>
        <span>&#9632; <span style="color:#006600;font-weight:bold;">Upper-Mid</span> 5000+</span>
        <span>&#9632; <span style="color:#000080;font-weight:bold;">Average</span> 3000+</span>
        <span>&#9632; <span style="color:#555;font-weight:bold;">Entry</span> 1000+</span>
        <span>&#9632; <span style="color:#999;font-weight:bold;">Low</span> &lt;1000</span>
      </div>
      <div id="list"><div class="loading-msg">Loading benchmark database...</div></div>
    </div>
  </div>

  <div class="footer">CPU Metic Benchmark Database &copy; 2026</div>

</div>
<script>
var allData=[];
var sortField='score';

function getTier(s){
  if(s>=9000)return'Elite';
  if(s>=7000)return'High-End';
  if(s>=5000)return'Upper-Mid';
  if(s>=3000)return'Average';
  if(s>=1000)return'Entry';
  return'Low';
}
function getStars(s){
  if(s>=9000)return'★★★★★';
  if(s>=7000)return'★★★★☆';
  if(s>=5000)return'★★★☆☆';
  if(s>=3000)return'★★☆☆☆';
  if(s>=1000)return'★☆☆☆☆';
  return'☆☆☆☆☆';
}

function renderTable(arr){
  if(!arr.length){
    document.getElementById('list').innerHTML='<div class="err-msg">No data found.</div>';
    return;
  }
  var h='<table><thead><tr>'+
    '<th style="width:60px;">Rank</th>'+
    '<th>User ID</th>'+
    '<th>Processor</th>'+
    '<th style="width:110px;">Score</th>'+
    '<th style="width:150px;">Date</th>'+
    '</tr></thead><tbody>';
  arr.forEach(function(item,i){
    var tier=getTier(item.score);
    var stars=getStars(item.score);
    h+='<tr>'+
      '<td class="td-rank">#'+(i+1)+'</td>'+
      '<td class="td-user"><a href="view.html?id='+item.id+'">'+item.id+'</a></td>'+
      '<td class="td-cpu">'+item.cpu+'<br><span class="cpu-cores">'+item.cores+'</span></td>'+
      '<td class="td-score">'+
        '<div class="score-num">'+item.score.toLocaleString()+' pts</div>'+
        '<div><span class="tier-badge t-'+tier+'">'+tier+'</span></div>'+
      '</td>'+
      '<td class="td-date">'+item.date+'</td>'+
      '</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('list').innerHTML=h;
  document.getElementById('toolbarInfo').textContent=arr.length+' entries | updated '+new Date().toLocaleTimeString();
}

function sortBy(field){
  sortField=field;
  document.getElementById('btnScore').className='toolbar-btn'+(field==='score'?' active':'');
  document.getElementById('btnDate').className='toolbar-btn'+(field==='date'?' active':'');
  if(field==='score') allData.sort(function(a,b){return b.score-a.score;});
  else allData.sort(function(a,b){return b.date.localeCompare(a.date);});
  renderTable(allData);
}

function loadData(){
  document.getElementById('list').innerHTML='<div class="loading-msg">Loading benchmark database...</div>';
  document.getElementById('toolbarInfo').textContent='Loading...';
  fetch('https://cpumetic-default-rtdb.asia-southeast1.firebasedatabase.app/.json')
  .then(function(r){return r.json();})
  .then(function(data){
    allData=[];
    Object.keys(data).forEach(function(id){
      var e=data[id];
      if(!e||!e.result||!e.cpu)return;
      var s=e.result.score;
      if(typeof s==='string')s=parseFloat(s.replace(/[^0-9.]/g,''))||0;
      s=Math.round(s);
      allData.push({id:id,score:s,cpu:e.cpu.name||'Unknown',cores:e.cpu.cores||'',date:e.report_date||''});
    });
    sortBy(sortField);
  })
  .catch(function(err){
    document.getElementById('list').innerHTML='<div class="err-msg">Failed to load: '+err.message+'</div>';
    document.getElementById('toolbarInfo').textContent='Error';
  });
}
loadData();
</script>
</body>
</html>
