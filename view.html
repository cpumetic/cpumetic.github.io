<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CPU Metic Report</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#c0c0c8;
  font-family:Tahoma,Verdana,Arial,sans-serif;
  font-size:12px;
  color:#000;
  padding:10px;
}
.container{
  max-width:900px;
  margin:0 auto;
}
.header{
  background:#000080;
  color:#fff;
  padding:8px 12px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  border:1px solid #9999cc;
  margin-bottom:6px;
}
.back-link{
  display:inline-block;
  color:#000080;
  font-size:11px;
  font-weight:bold;
  text-decoration:none;
  margin-bottom:6px;
  padding:2px 0;
}
.back-link:hover{text-decoration:underline;color:#cc0000;}

/* Score panel */
.panel{
  border:1px solid #999;
  margin-bottom:8px;
}
.panel-title{
  background:#000080;
  color:#fff;
  padding:4px 10px;
  font-weight:bold;
  font-size:12px;
}
.panel-body{
  background:#d4d0c8;
  padding:12px;
}
.scorebox{
  text-align:center;
  padding:10px 0 6px;
}
.userid-lbl{font-size:11px;color:#555;margin-bottom:2px;}
.userid-val{font-size:16px;font-weight:bold;color:#000080;margin-bottom:10px;}
.score-big{
  font-size:64px;
  font-weight:bold;
  color:#cc0000;
  font-family:Courier New,monospace;
  line-height:1;
}
.score-unit{font-size:16px;color:#555;font-weight:normal;font-family:Tahoma,sans-serif;}
.score-outof{font-size:11px;color:#777;margin-top:2px;}
.tier-badge{
  display:inline-block;
  font-size:13px;
  font-weight:bold;
  padding:3px 16px;
  margin:8px auto 4px;
}
.stars-big{font-size:20px;color:#cc8800;letter-spacing:2px;margin-top:4px;}
.score-bar-wrap{
  max-width:380px;
  margin:10px auto 4px;
  background:#aaa;
  border:1px solid #888;
  height:12px;
}
.score-bar-fill{height:100%;background:#000080;}
.score-pct{font-size:10px;color:#666;margin-top:2px;}

/* Tables */
table{width:100%;border-collapse:collapse;}
td{
  border:1px solid #bbb;
  padding:6px 8px;
  font-size:11px;
  vertical-align:middle;
}
td.lbl{
  width:36%;
  background:#e8e4dc;
  font-weight:bold;
  color:#000066;
}
td.val{background:#f4f0e8;}

.score-val-cell{
  font-size:14px;
  font-weight:bold;
  font-family:Courier New,monospace;
  color:#cc0000;
}

.t-Elite    {background:#8B6914;color:#fff;}
.t-High-End {background:#cc5500;color:#fff;}
.t-Upper-Mid{background:#006600;color:#fff;}
.t-Average  {background:#000080;color:#fff;}
.t-Entry    {background:#555;color:#fff;}
.t-Low      {background:#999;color:#fff;}

.bar-Elite    {background:#8B6914;}
.bar-High-End {background:#cc5500;}
.bar-Upper-Mid{background:#006600;}
.bar-Average  {background:#000080;}
.bar-Entry    {background:#555;}
.bar-Low      {background:#999;}

.footer{
  text-align:center;
  font-size:11px;
  color:#444;
  margin-top:8px;
  padding:4px;
}
.loading-msg{padding:40px;text-align:center;color:#000080;font-size:13px;}
.err-msg{padding:30px;text-align:center;color:#cc0000;font-size:13px;}

@media(max-width:600px){
  .score-big{font-size:44px;}
  td.lbl,td.val{display:block;width:100%;}
  td.lbl{border-bottom:none;}
}
</style>
</head>
<body>
<div class="container" id="content">
  <div class="loading-msg">Loading Benchmark Report...</div>
</div>

<script>
function getTier(s){
  if(s>=9000)return'Elite';
  if(s>=7000)return'High-End';
  if(s>=5000)return'Upper-Mid';
  if(s>=3000)return'Average';
  if(s>=1000)return'Entry';
  return'Low';
}
function getStars(s){
  if(s>=9000)return'★★★★★';
  if(s>=7000)return'★★★★☆';
  if(s>=5000)return'★★★☆☆';
  if(s>=3000)return'★★☆☆☆';
  if(s>=1000)return'★☆☆☆☆';
  return'☆☆☆☆☆';
}

var id=new URLSearchParams(window.location.search).get('id');
if(!id){
  document.getElementById('content').innerHTML='<div class="err-msg">No User ID Specified</div>';
}else{
  fetch('https://cpumetic-default-rtdb.asia-southeast1.firebasedatabase.app/'+id+'.json')
  .then(function(r){return r.json();})
  .then(function(pc){
    if(!pc){
      document.getElementById('content').innerHTML='<div class="err-msg">Benchmark Report Not Found</div>';
      return;
    }
    var raw=pc.result.score;
    if(typeof raw==='string')raw=parseFloat(raw.replace(/[^0-9.]/g,''))||0;
    var score=Math.round(raw);
    var tier=getTier(score);
    var stars=getStars(score);
    var pct=Math.min(100,(score/10000)*100).toFixed(1);
    document.title='CPU Metic Report - '+id;

    var html=
      '<div class="header">CPU METIC ONLINE BENCHMARK</div>'+
      '<a class="back-link" href="index.html">&#8592; Back to Global Ranking</a>'+

      '<div class="panel">'+
        '<div class="panel-title">BENCHMARK SCORE</div>'+
        '<div class="panel-body">'+
          '<div class="scorebox">'+
            '<div class="userid-lbl">Report for</div>'+
            '<div class="userid-val">'+id+'</div>'+
            '<div class="score-big">'+score.toLocaleString()+'<span class="score-unit"> pts</span></div>'+
            '<div class="score-outof">out of 10,000 pts</div>'+
            '<div><span class="tier-badge t-'+tier+'">'+tier+'</span></div>'+
            '<div class="stars-big">'+stars+'</div>'+
            '<div class="score-bar-wrap"><div class="score-bar-fill bar-'+tier+'" style="width:'+pct+'%"></div></div>'+
            '<div class="score-pct">'+pct+'% of maximum</div>'+
          '</div>'+
        '</div>'+
      '</div>'+

      '<div class="panel">'+
        '<div class="panel-title">CPU INFORMATION</div>'+
        '<div class="panel-body" style="padding:0;">'+
        '<table>'+
          '<tr><td class="lbl">Processor</td><td class="val">'+pc.cpu.name+'</td></tr>'+
          '<tr><td class="lbl">Clock Speed</td><td class="val">'+pc.cpu.speed+'</td></tr>'+
          '<tr><td class="lbl">Core Count</td><td class="val">'+pc.cpu.cores+'</td></tr>'+
        '</table></div>'+
      '</div>'+

      '<div class="panel">'+
        '<div class="panel-title">COMPRESSION TEST</div>'+
        '<div class="panel-body" style="padding:0;">'+
        '<table>'+
          '<tr><td class="lbl">Compression Speed</td><td class="val">'+pc.compression.speed+'</td></tr>'+
          '<tr><td class="lbl">Execution Time</td><td class="val">'+pc.compression.time+'</td></tr>'+
        '</table></div>'+
      '</div>'+

      '<div class="panel">'+
        '<div class="panel-title">CRYPTOGRAPHIC TEST</div>'+
        '<div class="panel-body" style="padding:0;">'+
        '<table>'+
          '<tr><td class="lbl">Encryption Speed</td><td class="val">'+pc.cryptographic.speed+'</td></tr>'+
          '<tr><td class="lbl">Execution Time</td><td class="val">'+pc.cryptographic.time+'</td></tr>'+
        '</table></div>'+
      '</div>'+

      '<div class="panel">'+
        '<div class="panel-title">BENCHMARK RESULT</div>'+
        '<div class="panel-body" style="padding:0;">'+
        '<table>'+
          '<tr><td class="lbl">Performance Score</td><td class="val"><span class="score-val-cell">'+score.toLocaleString()+' / 10,000 pts</span></td></tr>'+
          '<tr><td class="lbl">Tier</td><td class="val"><span class="tier-badge t-'+tier+'" style="font-size:11px;padding:2px 10px;">'+tier+'</span></td></tr>'+
          '<tr><td class="lbl">Star Rating</td><td class="val" style="color:#cc8800;font-size:14px;letter-spacing:2px;">'+stars+'</td></tr>'+
          '<tr><td class="lbl">Report Date</td><td class="val" style="font-family:Courier New,monospace;">'+pc.report_date+'</td></tr>'+
        '</table></div>'+
      '</div>'+

      '<div class="footer">CPU Metic Benchmark Database &copy; 2026</div>';

    document.getElementById('content').innerHTML=html;
  })
  .catch(function(err){
    document.getElementById('content').innerHTML='<div class="err-msg">Failed To Load Benchmark Report</div>';
  });
}
</script>
</body>
</html>
